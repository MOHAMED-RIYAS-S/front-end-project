<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechLearn</title>

<style>
/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* Navigation Bar */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#3a3131;
    color:white;
    padding:15px 30px;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    list-style:none;
}

.nav-links li{
    margin-left:20px;
}

.nav-links a{
    text-decoration:none;
    color:white;
}

/* Hero Section */
.hero{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    height:70vh;
    background:#d16a6a;
}

.hero h1{
    font-size:42px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    margin-bottom:20px;
}

.btn{
    padding:12px 25px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

/* Features Section */
.features{
    padding:40px;
}

.features h2{
    text-align:center;
    margin-bottom:30px;
}

.feature-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    border:1px solid #ccc;
    padding:25px;
    text-align:center;
    border-radius:8px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Footer */
footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}

/* Responsive Design */
@media(max-width:770px){

    .navbar{
        flex-direction:column;
    }

    .nav-links{
        flex-direction:column;
        margin-top:10px;
    }

    .nav-links li{
        margin:10px 0;
    }

    .feature-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- Navigation Bar -->
<nav class="navbar">
    <div class="logo">TechLearn</div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Courses</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<!-- Hero Section -->

<section class="hero">
     <img src="C:\Users\MOHAMED RIYAZ\Desktop\HTML\download (2).webp" width="200">
    <h1>Learn Web Development</h1>
    <p>Master HTML, CSS and JavaScript.</p>
    <a href="#" class="btn">Get Started</a>
</section>

<!-- Features Section -->
<section class="features">
    <h2>Our Courses</h2>

    <div class="feature-grid">
        <div class="card">
            <h3>HTML</h3>
            <p>Learn the structure of web pages.</p>
        </div>

        <div class="card">
            <h3>CSS</h3>
            <p>Design beautiful and responsive websites.</p>
        </div>

        <div class="card">
            <h3>JavaScript</h3>
            <p>Add interactivity and dynamic features.</p>
        </div>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 TechLearn</p>
</footer>

</body>
</html>
