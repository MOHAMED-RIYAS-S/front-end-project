<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guessing Number Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-card">
    <h1>Guessing Number</h1>
    <p id="message">Guess a number between 1 and 100</p>

    <input id="guessInput" type="number" placeholder="Enter your guess" />

    <button id="checkBtn">Check</button>
    <button id="resetBtn" class="reset">Reset</button>

    <div class="attempts">Attempts: <span id="attempts">0</span></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
