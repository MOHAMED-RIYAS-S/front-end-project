<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guessing Number Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef4ff;
      padding: 20px;
    }

    .game-box {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      padding: 28px;
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
      color: #1f2937;
      font-size: 28px;
    }

    p {
      min-height: 24px;
      margin-bottom: 18px;
      color: #4b5563;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .reset {
      background: #ef4444;
    }

    .reset:hover {
      background: #dc2626;
    }

    .attempts {
      margin-top: 18px;
      color: #111827;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="game-box">
    <h1>Guessing Number</h1>
    <p id="message">Guess a number between 1 and 100</p>

    <input id="guessInput" type="number" placeholder="Enter your guess" />

    <button onclick="checkGuess()">Check</button>
    <button class="reset" onclick="resetGame()">Reset</button>

    <div class="attempts">Attempts: <span id="attempts">0</span></div>
  </div>

  <script>
    let secretNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    const guessInput = document.getElementById("guessInput");
    const message = document.getElementById("message");
    const attemptsText = document.getElementById("attempts");

    function checkGuess() {
      const guess = Number(guessInput.value);

      if (!guess || guess < 1 || guess > 100) {
        message.textContent = "Please enter a number from 1 to 100";
        return;
      }

      attempts++;
      attemptsText.textContent = attempts;

      if (guess === secretNumber) {
        message.textContent = `Correct! You guessed it in ${attempts} attempts`;
      } else if (guess < secretNumber) {
        message.textContent = "Too low! Try again";
      } else {
        message.textContent = "Too high! Try again";
      }

      guessInput.value = "";
      guessInput.focus();
    }

    function resetGame() {
      secretNumber = Math.floor(Math.random() * 100) + 1;
      attempts = 0;
      attemptsText.textContent = attempts;
      message.textContent = "Guess a number between 1 and 100";
      guessInput.value = "";
      guessInput.focus();
    }

    guessInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        checkGuess();
      }
    });
  </script>
</body>
</html>
